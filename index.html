<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>紅 Kurenai OS — Unified HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Shippori+Mincho:wght@600;700&display=swap">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
<div class="bg-flora" aria-hidden="true">
  <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span>
  <span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span>
</div>
<div id="app">
  <header id="topbar">
    <div class="nav-arrows">
      <button id="nav-back" class="nav-back" type="button" aria-label="Back to previous page" title="Back (Alt+←)" disabled>‹ Back</button>
      <button id="nav-fwd" class="nav-back nav-fwd" type="button" aria-label="Forward to next page" title="Forward (Alt+→)" disabled>Forward ›</button>
    </div>
    <div class="brand">
      <span class="kanji" aria-hidden="true">紅</span>
      <span class="name">Kurenai OS</span>
      <span class="sub">Unified HQ · Build 3j</span>
    </div>
    <div id="searchbox">
      <span class="glyph" aria-hidden="true">⌕</span>
      <input id="search" type="search" placeholder="Search spec points &amp; flashcards…  press / to search"
             autocomplete="off" aria-label="Search the specification database">
      <div id="search-results" role="listbox"></div>
    </div>
    <div id="hud"></div>
    <div class="save-wrap" title="Every change autosaves to this browser">
      <span id="save-dot"></span><span>AUTOSAVE</span>
    </div>
  </header>

  <div id="cols">
    <nav id="rail" aria-label="Primary">
      <button id="rail-toggle" aria-label="Collapse sidebar" title="Collapse / expand sidebar">‹</button>
      <div class="rail-h">System</div>
      <button class="rail-item" data-view="home">
        <span class="dot" style="--accent:#e8425a"></span><span class="lbl">Overview</span>
      </button>
      <button class="rail-item" data-view="focus">
        <span class="dot" style="--accent:#45d6a8"></span><span class="lbl">Focus Timer</span>
      </button>
      <button class="rail-item" data-view="due">
        <span class="dot" style="--accent:#ecc15a"></span><span class="lbl">Due Today</span><span class="pc" id="pc-due"></span>
      </button>
      <button class="rail-item" data-view="calendar">
        <span class="dot" style="--accent:#7b9ef8"></span><span class="lbl">Calendar</span>
      </button>
      <button class="rail-item" data-view="governor">
        <span class="dot" style="--accent:#c77bf2"></span><span class="lbl">Governor</span>
      </button>

      <div class="rail-h">Records</div>
      <button class="rail-item" data-view="tracker">
        <span class="dot" style="--accent:#ef4965"></span><span class="lbl">Exams &amp; Papers</span>
      </button>
      <button class="rail-item" data-view="cardstats">
        <span class="dot" style="--accent:#ecc15a"></span><span class="lbl">Card Stats</span>
      </button>

      <div class="rail-h">Subjects</div>
      <button class="rail-item" data-view="subject" data-subject="compsci" style="--accent:var(--c-compsci)">
        <span class="dot"></span><span class="lbl">Computer Science</span><span class="pc" id="pc-compsci"></span>
      </button>
      <button class="rail-item" data-view="subject" data-subject="maths" style="--accent:var(--c-maths)">
        <span class="dot"></span><span class="lbl">Mathematics</span><span class="pc" id="pc-maths"></span>
      </button>
      <button class="rail-item" data-view="subject" data-subject="it" style="--accent:var(--c-it)">
        <span class="dot"></span><span class="lbl">IT · Data Analytics</span><span class="pc" id="pc-it"></span>
      </button>

      <div class="rail-h">Collection</div>
      <button class="rail-item" data-view="matrix">
        <span class="dot" style="--accent:#ef4965"></span><span class="lbl">Collection Matrix</span>
      </button>
      <button class="rail-item" data-view="anime">
        <span class="dot" style="--accent:#ff5e78"></span><span class="lbl">Anime</span>
      </button>
      <button class="rail-item" data-view="books">
        <span class="dot" style="--accent:#ecc15a"></span><span class="lbl">Books</span>
      </button>
      <button class="rail-item" data-view="vn">
        <span class="dot" style="--accent:#c77bf2"></span><span class="lbl">Visual Novels</span>
      </button>
      <button class="rail-item" data-view="game">
        <span class="dot" style="--accent:#66c0f4"></span><span class="lbl">Games</span>
      </button>
      <button class="rail-item" data-view="wishlist">
        <span class="dot" style="--accent:#66c0f4"></span><span class="lbl">Budget Planner</span>
      </button>
      <button class="rail-item" data-view="shrine">
        <span class="dot" style="--accent:#ecc15a"></span><span class="lbl">The Shrine</span>
      </button>
      <button class="rail-item" data-view="aniprofile">
        <span class="dot" style="--accent:#3db4f2"></span><span class="lbl">AniList Profile</span>
      </button>
      <button class="rail-item" data-view="vndbprofile">
        <span class="dot" style="--accent:#c77bf2"></span><span class="lbl">VNDB Profile</span>
      </button>

      <div class="rail-h">Data</div>
      <button class="rail-item" data-view="data">
        <span class="dot" style="--accent:#6f6488"></span><span class="lbl">Backup &amp; Restore</span>
      </button>
      <button class="rail-item" data-view="help">
        <span class="dot" style="--accent:#45d6a8"></span><span class="lbl">Help &amp; Guide</span>
      </button>

      <div class="rail-foot">
        <span class="rail-brand"><span class="k">紅</span> Unified HQ</span>
        <span id="node-count"></span> spec points indexed
      </div>
    </nav>

    <aside id="tree" class="hidden" aria-label="Topic tree"></aside>

    <main id="main" tabindex="-1"></main>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- data (generated from the official specification PDFs) -->
<script src="js/data/compsci.js"></script>
<script src="js/data/maths.js"></script>
<script src="js/data/it.js"></script>
<script src="js/data/it-f201-spec.js"></script>
<script src="js/data/intel.js"></script>
<!-- core -->
<script src="js/core/store.js"></script>
<script src="js/core/ui.js"></script>
<script src="js/core/charts.js"></script>
<script src="js/core/content.js"></script>
<script src="js/core/srs.js"></script>
<script src="js/core/sessions.js"></script>
<script src="js/core/governor.js"></script>
<!-- Build 3a: Collection Matrix core (IndexedDB store → AniList client → domain) -->
<script src="js/core/mediadb.js"></script>
<script src="js/core/anilist.js"></script>
<script src="js/core/vndb.js"></script>
<script src="js/core/bookapi.js"></script>
<script src="js/core/media.js"></script>
<script src="js/core/mediapush.js"></script>
<script src="js/core/autosync.js"></script>
<!-- deep revision content (wave 1) -->
<script src="js/data/content/cs-programming.js"></script>
<script src="js/data/content/cs-theory-computation.js"></script>
<script src="js/data/content/cs-theory-computation-2.js"></script>
<script src="js/data/content/cs-data-rep.js"></script>
<script src="js/data/content/cs-data-rep-2.js"></script>
<script src="js/data/content/cs-architecture.js"></script>
<script src="js/data/content/cs-networking-ethics.js"></script>
<script src="js/data/content/cs-advanced.js"></script>
<script src="js/data/content/cs-databases-sys.js"></script>
<script src="js/data/content/cs-datastructures.js"></script>
<script src="js/data/content/cs-algorithms.js"></script>
<script src="js/data/content/cs-algorithms-2.js"></script>
<script src="js/data/content/cs-theory.js"></script>
<script src="js/data/content/cs-nea.js"></script>
<script src="js/data/content/maths-pure.js"></script>
<script src="js/data/content/maths-applied.js"></script>
<script src="js/data/content/it-core.js"></script>
<script src="js/data/content/it-f201.js"></script>
<!-- engines -->
<script src="js/engines/flashcards.js"></script>
<script src="js/engines/quiz.js"></script>
<!-- modules -->
<script src="js/modules/hub.js"></script>
<script src="js/modules/due.js"></script>
<script src="js/modules/calendar.js"></script>
<script src="js/modules/todo.js"></script>
<script src="js/modules/governor-ui.js"></script>
<script src="js/modules/tracker.js"></script>
<script src="js/modules/rag.js"></script>
<script src="js/modules/cardstats.js"></script>
<script src="js/modules/attachments.js"></script>
<script src="js/modules/help.js"></script>
<script src="js/modules/focus.js"></script>
<!-- Collection Matrix views — medview.js is the shared vault-view toolkit
     (cover/lazy list/pills/empty states/editor shell) the four views build
     on; each view registers its editor in KOS.mediaEditors (dispatch lives
     in core/media.js), so their relative order after medview.js is free -->
<script src="js/modules/medview.js"></script>
<script src="js/modules/anime.js"></script>
<script src="js/modules/books.js"></script>
<script src="js/modules/vn.js"></script>
<script src="js/modules/games.js"></script>
<script src="js/modules/aniprofile.js"></script>
<script src="js/modules/vndbprofile.js"></script>
<!-- wishlist.js registers a KOS.mediaEditorHooks entry for the reverse
     "on your wishlist" surfacing -->
<script src="js/modules/wishlist.js"></script>
<script src="js/modules/matrix.js"></script>
<script src="js/modules/shrine.js"></script>
<script src="js/modules/mediasync.js"></script>
<script src="js/modules/mediasearch.js"></script>
<script src="js/labs/worked.js"></script>
<script src="js/labs/trace.js"></script>
<script src="js/labs/oop.js"></script>
<script src="js/labs/sims.js"></script>
<script src="js/labs/sandboxes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
