const utf8=b64=>decodeURIComponent(Array.from(atob(b64),c=>'%' + c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));
for(const [id,src] of Object.entries(docs)) document.getElementById('frame-'+id).srcdoc=utf8(src);
let activeLayout=localStorage.getItem('kos-lab-layout')||'fable';
let theme=THEMES.find(t=>t.id===localStorage.getItem('kos-lab-theme'))||THEMES[0];
const drawer=document.getElementById('drawer'),groups=document.getElementById('themeGroups');
function postTheme(){document.querySelectorAll('.frame').forEach(f=>f.contentWindow&&f.contentWindow.postMessage({type:'kos-theme',theme},'*'))}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='kos-ready')postTheme()});
function setLayout(id){activeLayout=id;localStorage.setItem('kos-lab-layout',id);document.querySelectorAll('.frame').forEach(f=>f.classList.toggle('active',f.id==='frame-'+id));document.querySelectorAll('.layout').forEach(b=>b.classList.toggle('active',b.dataset.layout===id));postTheme()}
function setTheme(t){theme=t;localStorage.setItem('kos-lab-theme',t.id);document.getElementById('themeLabel').textContent=t.name;document.getElementById('mood').textContent=t.mood;document.getElementById('treatment').textContent=t.treatment;document.documentElement.style.setProperty('--a',t.vars.accent);document.documentElement.style.setProperty('--b',t.vars.accent2);document.documentElement.style.setProperty('--c',t.vars.accent3);document.querySelectorAll('.theme').forEach(x=>x.classList.toggle('active',x.dataset.id===t.id));postTheme()}
for(const group of [...new Set(THEMES.map(t=>t.group))]){const h=document.createElement('div');h.className='group-title';h.textContent=group;groups.appendChild(h);const grid=document.createElement('div');grid.className='theme-grid';for(const t of THEMES.filter(x=>x.group===group)){const b=document.createElement('button');b.className='theme';b.dataset.id=t.id;b.style.setProperty('--accent',t.vars.accent);b.innerHTML='<span class="palette">'+t.c.map(c=>'<i style="background:'+c+'"></i>').join('')+'</span><b>'+t.name+'</b><small>'+t.source+'</small>';b.onclick=()=>setTheme(t);grid.appendChild(b)}groups.appendChild(grid)}
document.querySelectorAll('.layout').forEach(b=>b.onclick=()=>setLayout(b.dataset.layout));
document.getElementById('themeTrigger').onclick=()=>drawer.classList.toggle('open');
document.getElementById('close').onclick=()=>drawer.classList.remove('open');
setLayout(activeLayout);setTheme(theme);setTimeout(postTheme,500);setTimeout(postTheme,1600);
</script></body></html>
